encoder:
  embedding_dim: 64
  f_block:
    hidden: 32
    layers: 3
    residual_blocks: 2
  g_block:
    hidden: 32
    layers: 3
    residual_blocks: 2
  h_block:
    hidden: 32
    layers: 3
  standardize_inputs: true
  encoder_version: d2v-v1

training:
  corpus_dir: backend/agents/dataset2vec/corpus
  device: cuda                       # cuda | cpu
  use_amp: true                      # mixed precision on GPU
  n_instances_sample: 256
  n_features_sample: 16
  # 118/121 real-corpus datasets have <=26 classes; bumped from 3 (toy-corpus
  # default) so multi-class one-hot target_repr isn't truncated for them. The
  # 3 outlier 100-class "plant-*" datasets still lose some class information
  # (truncated past index 26) -- raising this to 100 would inflate every
  # cell's input dimension across all 121 datasets just for 3 outliers.
  n_classes_sample: 26
  pairs_per_batch: 64
  gamma: 1.0
  learning_rate: 0.001
  epochs: 10000
  es_patience: 16
  es_min_delta: 0.001
  checkpoint_every: 50
  random_state: 42

sweep:
  corpus_dir: backend/agents/dataset2vec/corpus
  # Real corpus (121 UCI classification datasets) has no regression targets,
  # so only classification models are swept -- 20 models spanning linear,
  # tree-ensemble, SVM, neighbor, NB, discriminant-analysis, and one PyTorch
  # (GPU-serialized) family. See claude_scripts/convert_dataset2vec_corpus.py.
  models:
    - LogisticRegression
    - RidgeClassifier
    - SGDClassifier
    - SVC
    - LinearSVC
    - NuSVC
    - DecisionTreeClassifier
    - RandomForestClassifier
    - ExtraTreesClassifier
    - GradientBoostingClassifier
    - AdaBoostClassifier
    - HistGradientBoostingClassifier
    - KNeighborsClassifier
    - GaussianNB
    - MLPClassifier
    - LinearDiscriminantAnalysis
    - QuadraticDiscriminantAnalysis
    - BaggingClassifier
    - XGBClassifier
    - PyTorchFCNNClassifier
  # Sized to fit a conservative 5 GB memory envelope (NOT the full 13 GB), so the
  # sweep is safe even when other apps are resident. Each worker resident-imports
  # torch+xgboost+sklearn (~660 MB) before training; nested parallelism is already
  # eliminated (n_jobs=1 forced + OMP/BLAS thread caps in sweep.py), so per-worker
  # peak is import baseline + a small training array (~1 GB). Budget for 5 GB:
  #   driver ~0.8 GB + plasma 0.5 GB + 2 workers x ~1.05 GB = ~3.4 GB (1.6 GB slack).
  # 3 workers would push peak to ~4.5 GB -- too tight once a tree ensemble on the
  # largest dataset (miniboone) spikes. Stay at 2 unless the cap is raised.
  n_parallel: 2
  # Hard cap on Ray's plasma object store. Default is 30% of RAM, which starves
  # the workers. CommonData objects here are KB-to-53MB, so 0.5 GB is ample even
  # with a couple of datasets' arrays in flight at once.
  object_store_memory_gb: 0.5
  # Reduced from 50 -> 25: fewer trials means each (dataset, model) study holds
  # the model in memory for less total time and the whole sweep finishes faster.
  # TPE still gets enough samples to beat default config on most search spaces.
  n_trials_per_model: 25
  primary_metric: f1_macro           # classification; rmse/r2 for regression corpora
  leaderboard_top_n: 10
  same_task_only: true
  # GPU is a 4GB RTX 3050 Laptop -> only one PyTorch trial trains on the GPU at a
  # time. sklearn/xgboost trials request CPU only and run in parallel regardless.
  gpu_fraction_pytorch: 1.0
  optuna_sampler: tpe                # tpe | random  (hash-map dispatch)
  optuna_pruner: median              # median | none (hash-map dispatch)
  optuna_storage: "sqlite:///store/optuna.db"
  scratch_dir: store/scratch
  cleanup_interval_seconds: 3600     # hourly janitor: gc + empty_cache + temp delete
  # Per-study wall-time cap: study.optimize stops after this many seconds even
  # if n_trials haven't all completed. Prevents runaway trials on large datasets.
  study_timeout_seconds: 600
  # Datasets with total rows >= this threshold are considered "large". O(n^2)
  # models (kernel SVMs) are skipped entirely for large datasets because a
  # single trial on 100K rows can take hours (libsvm is O(n^2) to O(n^3)).
  large_dataset_row_threshold: 10000
  large_dataset_skip_models:
    - SVC
    - NuSVC
  # Max concurrent Ray tasks when processing a large dataset. Limits how many
  # models train simultaneously so 15 x GBM-on-130K-rows does not OOM the node.
  large_dataset_n_parallel: 5

store:
  # store_dir itself lives in config.ini [paths] store_dir (paths are never
  # hardcoded or duplicated into config.yaml).
  faiss_metric: inner_product
  normalize_embeddings: true

retrieval:
  top_k: 10
  n_recommended_models: 10           # floor 5
  same_task_only: true
  min_similarity: 0.0
  model_vote: similarity_weighted    # hash-map dispatch
  verify: true                       # train suggestions on the test set and match
  verify_tolerance: 0.05             # |achieved - expected| within-tolerance band
