# Weights for the scoring function: performance, overfitting, complexity.
# Must sum to 1.0.
weights:
  performance: 0.60
  overfitting: 0.30
  complexity:  0.10

# Hard-gate floors: models scoring below these are always rejected.
accuracy_floor: 0.60     # classification: primary metric = accuracy
r2_floor: 0.40           # regression:     primary metric = r2

# Tie-break: if two models' primary-metric diff <= tie_break_pct, prefer simpler.
tie_break_pct: 0.01

# Complexity normalization bounds. family_rank is a 1-N integer (lower = simpler).
# These are used for min-max scaling across the candidate set.
complexity_normalization:
  n_params_max: 1000000   # cap for normalizing n_params to [0,1]
  depth_max: 100          # cap for depth
  family_rank_max: 10     # cap for family_rank

# Overfitting signal normalization cap (gaps beyond this are treated as 1.0).
overfitting_gap_cap: 0.50

# Number of top SHAP features to include when building shap_summary from a CSV.
shap_top_n_features: 5

# LLM settings. Credentials are resolved via LlmSettingsResolver (reads .env:
# LLM_TYPE, LLM_MODEL, LLM_API_KEY, LLM_GATEWAY_URL) - same as every other agent.
use_llm: true
prompt_template: judge_prompt.jinja2
# When true, sets LITELLM_LOG=DEBUG around the judge LLM call so the raw litellm
# request/response is printed in the backend logs (same wire-level debug the
# other agents produce). The rendered prompt + response are always logged at INFO.
litellm_debug: false


# Maps each metric name to its direction for gap computation (mirrors parent tool).
# This avoids if-else ladders throughout the codebase.
metric_direction_map:
  accuracy:        higher_is_better
  f1_macro:        higher_is_better
  f1_weighted:     higher_is_better
  precision_macro: higher_is_better
  recall_macro:    higher_is_better
  r2:              higher_is_better
  mse:             lower_is_better
  rmse:            lower_is_better
  mae:             lower_is_better

# Primary metric per task type (used for hard-gate and tie-break).
primary_metric_map:
  classification: accuracy
  regression: r2

# Judge Findings: thresholds + labels driving the per-model decision card.
# All thresholds live here (no hardcoding inside findings_engine.py).
findings:
  # Human-readable dimension labels keyed by stable dimension id. The order of
  # this map is the order findings appear on each model decision card.
  dimension_labels:
    predictive_quality:  Predictive Quality
    class_balance:       Class Balance
    generalization:      Generalization
    feature_utilization: Feature Utilization
    data_leakage:        Data Leakage
    robustness:          Robustness
  # Classification metrics surfaced (in order) inside the predictive-quality line.
  classification_report_metrics:
    - accuracy
    - f1_macro
    - f1_weighted
    - precision_macro
    - recall_macro
    - roc_auc
    - balanced_accuracy
  # Regression metrics surfaced (in order) inside the predictive-quality line.
  regression_report_metrics:
    - r2
    - mae
    - rmse
  # Class balance: macro recall below this => weak minority-class recall.
  macro_recall_floor: 0.50
  # Class balance: |f1_weighted - f1_macro| above this => class prediction skew.
  f1_spread_warn: 0.15
  # Generalization: primary train-test gap above this => generalization concern.
  overfit_gap_warn: 0.10
  # Feature utilization: single top-feature share (of top-N |SHAP|) above this
  # => dominant-feature / shortcut concern.
  dominant_feature_share: 0.60
  # Data leakage: near-perfect train primary metric at/above this AND a gap at/
  # above leakage_gap_warn => potential shortcut learning / leakage.
  leakage_train_perfect: 0.999
  leakage_gap_warn: 0.20
  # Robustness: cross-validation std above this => unstable across folds.
  cv_std_unstable: 0.05
