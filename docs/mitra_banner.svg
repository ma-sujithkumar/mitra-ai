<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes rotateCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotateCCW {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 15px rgba(20, 184, 166, 0.8)); }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    
    .orbit-1 {
      animation: rotateCW 20s linear infinite;
      transform-origin: 150px 125px;
    }
    .orbit-2 {
      animation: rotateCCW 15s linear infinite;
      transform-origin: 150px 125px;
    }
    .core {
      animation: pulse 4s ease-in-out infinite;
      transform-origin: 150px 125px;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      font-size: 56px;
      fill: url(#textGrad);
      letter-spacing: 8px;
    }
    .subtitle-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #94a3b8;
      letter-spacing: 2px;
    }
    .badge-bg {
      fill: #1e293b;
      stroke: #334155;
      stroke-width: 1px;
    }
    .badge-text {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #e2e8f0;
    }
  </style>

  <!-- Left Side: Animated Agentic System -->
  <g id="agentic-system">
    <!-- Outer Orbit Path -->
    <circle cx="150" cy="125" r="90" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,4" />
    
    <!-- Outer Orbiting Agents -->
    <g class="orbit-1">
      <circle cx="150" cy="35" r="90" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5" stroke-dasharray="8,6" style="animation: dash 2s linear infinite;" />
      
      <!-- Agent Node A (Validation Agent) -->
      <g transform="translate(150, 35)">
        <circle cx="0" cy="0" r="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
        <circle cx="0" cy="0" r="4" fill="#3b82f6" />
      </g>
      
      <!-- Agent Node B (Feature Selection Agent) -->
      <g transform="translate(240, 125)">
        <circle cx="0" cy="0" r="10" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
        <circle cx="0" cy="0" r="4" fill="#10b981" />
      </g>
    </g>

    <!-- Inner Orbit Path -->
    <circle cx="150" cy="125" r="55" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="3,3" />
    
    <!-- Inner Orbiting Agents -->
    <g class="orbit-2">
      <!-- Agent Node C (Judge Agent) -->
      <g transform="translate(150, 70)">
        <circle cx="0" cy="0" r="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" filter="url(#glow)" />
        <circle cx="0" cy="0" r="3" fill="#8b5cf6" />
      </g>
      
      <!-- Agent Node D (HPT Agent) -->
      <g transform="translate(150, 180)">
        <circle cx="0" cy="0" r="8" fill="#0f172a" stroke="#f59e0b" stroke-width="2" filter="url(#glow)" />
        <circle cx="0" cy="0" r="3" fill="#f59e0b" />
      </g>
    </g>

    <!-- Central Database / ML Model Core -->
    <g class="core">
      <circle cx="150" cy="125" r="28" fill="#0f172a" stroke="url(#coreGrad)" stroke-width="3.5" filter="url(#glow)" />
      <!-- Inner core lines simulating data pathways -->
      <path d="M142 125 L158 125 M150 117 L150 133" stroke="#00ffff" stroke-width="2" stroke-linecap="round" />
      <circle cx="150" cy="125" r="4" fill="#ffffff" />
    </g>
  </g>

  <!-- Right Side: Typographic Branding -->
  <g transform="translate(280, 115)">
    <text x="0" y="0" class="title-text">MITRA</text>
    <text x="5" y="32" class="subtitle-text">MULTI-INTELLIGENT TRAINING &amp; ORCHESTRATION</text>
    
    <!-- Badges -->
    <g transform="translate(5, 52)">
      <!-- Self-Hosted Badge -->
      <rect x="0" y="0" width="95" height="22" rx="4" class="badge-bg" />
      <text x="47.5" y="15" text-anchor="middle" class="badge-text">SELF-HOSTED</text>
      
      <!-- Ray Distributed Badge -->
      <rect x="105" y="0" width="115" height="22" rx="4" class="badge-bg" />
      <text x="162.5" y="15" text-anchor="middle" class="badge-text">RAY DISTRIBUTED</text>

      <!-- Google ADK Badge -->
      <rect x="230" y="0" width="95" height="22" rx="4" class="badge-bg" />
      <text x="277.5" y="15" text-anchor="middle" class="badge-text">GOOGLE ADK</text>
    </g>
  </g>
</svg>
