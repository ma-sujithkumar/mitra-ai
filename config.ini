[python]
PYTHON=~/venv/bin/python

[paths]
WORKSPACE_ROOT=.mitra
SESSION_LOG_DIR=.mitra/logs

[upload]
MAX_FILE_SIZE_MB=200
ALLOWED_EXTENSIONS=.csv,.xls,.xlsx
MINI_DATA_SAMPLE_ROWS=1000
CHUNK_SIZE_ROWS=50000
RECENT_UPLOAD_LIMIT=5
MIN_ROWS=10
NULL_THRESHOLD=0.8
PII_PATTERNS=["(?i)aadhaar","(?i)pan_","(?i)mobile","(?i)phone","(?i)email","(?i)ssn","(?i)passport"]
# Minimum fraction of dataset columns that an uploaded metadata file must reference
# for it to be considered related to the dataset. Below this the metadata_match
# validation check fails (hard block).
METADATA_MATCH_MIN_OVERLAP=0.5

[pipeline]
TRAIN_TEST_SPLIT=0.8
MAX_ML_MODELS=10
MAX_HPT_TRIALS=5
# Run SHAP + overfitting + HPT + judge after training in the UI flow so the
# leaderboard/verdict populate. Set to false to stop at the training summary.
RUN_POST_TRAINING_EVAL=true
MAX_JUDGE_TURNS=3

[llm_models]
OPENAI_BASE_MODEL=openai/gpt-5.1
ANTHROPIC_BASE_MODEL=anthropic/claude-sonnet-4-5-20250929
GEMINI_BASE_MODEL=gemini/gemini-3-pro

[llm_base_urls]
# Default API base URL paired with each provider's default model. Used when a
# run/BYOM request and LLM_GATEWAY_URL in .env both leave the gateway blank.
OPENAI_BASE_URL=https://api.openai.com/v1
ANTHROPIC_BASE_URL=https://api.anthropic.com
GEMINI_BASE_URL=https://generativelanguage.googleapis.com

[metadata_agent]
CLASSIFICATION_UNIQUE_THRESHOLD=0.05
CATEGORICAL_UNIQUE_RATIO=0.05
LLM_MAX_RETRIES=3
METADATA_CONTEXT_CHAR_LIMIT=20000

[ray]
ADDRESS=auto
NAMESPACE=mitra-epic3
LOCAL_NUM_CPUS=0
INCLUDE_DASHBOARD=false
JOB_TIMEOUT_SEC=300
DEFAULT_CPUS_PER_JOB=1
IMAGE_CPUS_PER_JOB=2
IMAGE_GPUS_PER_JOB=1
DEFAULT_MEMORY_GB=0

[training_api]
MODEL_LIBRARY_ROOT=model_library
DEFAULT_EXECUTION_MODE=ray
SESSION_OUTPUT_DIR=training
METADATA_CANDIDATES=reports/metadata.json,metadata.json
MODEL_CONFIG_CANDIDATES=model_config.json,reports/model_config.json
TRAIN_CANDIDATES=data/train.csv,train.csv
TEST_CANDIDATES=data/test.csv,test.csv
RUN_STATUS_FILENAME=training_run.json
MANIFEST_FILENAME=training_jobs.json
SUMMARY_FILENAME=training_summary.json
MAX_CONCURRENT_RUNS=2
RAY_TIMEOUT_SEC=300

[hpt]
MAX_HPT_TRIALS=5
OVERFITTING_GAP_THRESHOLD=0.10
VAL_SPLIT_RATIO=0.2
HPT_N_JOBS=1
OPTUNA_SEED=42
