[python]
PYTHON=~/venv/bin/python

[paths]
WORKSPACE_ROOT=.mitra
SESSION_LOG_DIR=.mitra/logs
D2V_DB_DIR=DB

[logging]
# Global rotating backend log. Per-session activity is also written to
# activity.log inside each run directory under WORKSPACE_ROOT.
LOG_FILE=.mitra/logs/mitra.log
LOG_LEVEL=INFO
LOG_MAX_BYTES=5242880
LOG_BACKUP_COUNT=3

[upload]
MAX_FILE_SIZE_MB=200
ALLOWED_EXTENSIONS=.csv,.xls,.xlsx
MINI_DATA_SAMPLE_ROWS=1000
CHUNK_SIZE_ROWS=50000
RECENT_UPLOAD_LIMIT=5
MIN_ROWS=10
# Columns whose null fraction exceeds NULL_THRESHOLD are flagged. A column is
# only a hard block when it is the chosen target; otherwise it is warned about
# and auto-dropped before training (see NULL_DROP_THRESHOLD).
NULL_THRESHOLD=0.8
# Columns at/above this null fraction are auto-dropped by feature engineering.
# Mirrors agents/feature_engineering null_drop_threshold so validation and the
# pipeline agree on what gets removed.
NULL_DROP_THRESHOLD=0.5
PII_PATTERNS=["(?i)aadhaar","(?i)pan_","(?i)mobile","(?i)phone","(?i)email","(?i)ssn","(?i)passport"]
# Minimum fraction of dataset columns that an uploaded metadata file must reference
# for it to be considered related to the dataset. Below this the metadata_match
# validation check fails (hard block).
METADATA_MATCH_MIN_OVERLAP=0.5

[pipeline]
TRAIN_TEST_SPLIT=0.8
# Number of ML models to shortlist for training. Bounded by
# model_selection.MAX_SELECTABLE_MODELS (10). The deterministic selector
# returns fewer if the catalog has fewer models for the task type.
MAX_ML_MODELS=10
MAX_HPT_TRIALS=5
# Run SHAP + overfitting + HPT + judge after training in the UI flow so the
# leaderboard/verdict populate. Set to false to stop at the training summary.
RUN_POST_TRAINING_EVAL=true
MAX_JUDGE_TURNS=3

[llm_models]
OPENAI_BASE_MODEL=openai/gpt-5.1
ANTHROPIC_BASE_MODEL=anthropic/claude-sonnet-4-5-20250929
GEMINI_BASE_MODEL=gemini/gemini-2.5-flash

[llm_base_urls]
# Default API base URL paired with each provider's default model. Used when a
# run/BYOM request and LLM_GATEWAY_URL in .env both leave the gateway blank.
OPENAI_BASE_URL=https://api.openai.com/v1
ANTHROPIC_BASE_URL=https://api.anthropic.com
GEMINI_BASE_URL=

[metadata_agent]
CLASSIFICATION_UNIQUE_THRESHOLD=0.05
CATEGORICAL_UNIQUE_RATIO=0.05
LLM_MAX_RETRIES=3
METADATA_CONTEXT_CHAR_LIMIT=20000

[ray]
ADDRESS=auto
NAMESPACE=mitra-epic3
LOCAL_NUM_CPUS=0
INCLUDE_DASHBOARD=false
JOB_TIMEOUT_SEC=300
DEFAULT_CPUS_PER_JOB=1
IMAGE_CPUS_PER_JOB=2
IMAGE_GPUS_PER_JOB=1
DEFAULT_MEMORY_GB=0

[training_api]
MODEL_LIBRARY_ROOT=model_library
DEFAULT_EXECUTION_MODE=ray
SESSION_OUTPUT_DIR=training
METADATA_CANDIDATES=reports/metadata.json,metadata.json
MODEL_CONFIG_CANDIDATES=model_config.json,reports/model_config.json
TRAIN_CANDIDATES=data/train.csv,train.csv
TEST_CANDIDATES=data/test.csv,test.csv
RUN_STATUS_FILENAME=training_run.json
MANIFEST_FILENAME=training_jobs.json
SUMMARY_FILENAME=training_summary.json
MAX_CONCURRENT_RUNS=2
RAY_TIMEOUT_SEC=300

[hpt]
MAX_HPT_TRIALS=5
OVERFITTING_GAP_THRESHOLD=0.10
VAL_SPLIT_RATIO=0.2
HPT_N_JOBS=1
OPTUNA_SEED=42

[feature_engineering_api]
OUTPUT_SUBDIR=reports/feature_engineering
RUN_STATUS_FILENAME=feature_run.json

[authdb]
# PostgreSQL connection values are read from environment variables (.env) by
# the names listed below so no secrets live in this file.
DB_HOST_ENV=AUTHDB_HOST
DB_PORT_ENV=AUTHDB_PORT
DB_NAME_ENV=AUTHDB_NAME
DB_USER_ENV=AUTHDB_USER
DB_PASSWORD_ENV=AUTHDB_PASSWORD
# Sensible fallbacks used only when the matching env var is unset.
DB_HOST_DEFAULT=127.0.0.1
DB_PORT_DEFAULT=5432
DB_NAME_DEFAULT=authdb
DB_USER_DEFAULT=postgres
# Root directory under which per-user folders mitra/<user_id> are created.
USER_WORKSPACE_ROOT=mitra
PASSWORD_MIN_LENGTH=8
FALLBACK_DB_URL=sqlite:///auth.db


